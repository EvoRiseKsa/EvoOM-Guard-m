name: Windows compatibility

on:
  push:
    branches: [main]
  pull_request:

# The Windows compatibility suite only reads the source tree.
permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install pinned runner and test dependencies
        run: |
          npm ci --ignore-scripts --prefix tools/ci-vitest
          Add-Content -Path $env:GITHUB_PATH -Value "$env:GITHUB_WORKSPACE\tools\ci-vitest\node_modules\.bin"
          python -m pip install --only-binary=:all: --require-hashes -r requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Full Windows unit and security suite
        run: python -m pytest tests/ -q
      - name: CLI Unicode and zipapp smoke
        env:
          PYTHONIOENCODING: cp1256
        run: python -m pytest tests/test_cli.py tests/test_zipapp.py -q
